<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Zen Bali</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="icon" type="image/x-icon" href="../favicon.ico?v=20260327b">
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32.png?v=20260327b">
    <link rel="icon" type="image/svg+xml" href="../favicon.svg?v=20260327b">
    <link rel="shortcut icon" href="../favicon.ico?v=20260327b">
</head>
<body>
    <header class="header" style="background: var(--gray-900); border-bottom: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);">
        <div class="container">
            <div class="header-content">
                <a href="dashboard.html" class="logo" style="color: #ffffff;"><span>🌴</span><span>Zen Bali Admin</span></a>
                <nav class="nav">
                    <a href="../" class="nav-link" style="color: rgba(255, 255, 255, 0.82); background: rgba(255, 255, 255, 0.08); border-radius: 999px; padding: 0.5rem 0.9rem; font-weight: 500;">Back to Site</a>
                </nav>
            </div>
        </div>
    </header>
    <main style="padding: 3rem 0; background: linear-gradient(180deg, rgba(17, 24, 39, 0.06), transparent 220px); min-height: calc(100vh - 80px);">
        <div class="container" style="max-width: 400px;">
            <div class="card" style="border-top: 4px solid var(--orange-500);">
                <div class="card-header text-center">
                    <div style="font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 0.5rem;">Restricted Access</div>
                    <h1 class="card-title">Admin Login</h1>
                    <p class="text-muted mt-1">Use admin credentials only</p>
                </div>
                <div class="card-body">
                    <div id="alertContainer"></div>
                    <form id="loginForm">
                        <div class="form-group">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Password</label>
                            <div class="password-field">
                                <input type="password" name="password" class="form-control" required>
                                <button type="button" class="password-toggle" data-password-toggle="password" aria-pressed="false">Show</button>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn">Login</button>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <script src="../js/main.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Logging in...';
            try {
                const form = e.target;
                const response = await API.post('/admin/login', { email: form.email.value, password: form.password.value });
                if (response.success) {
                    localStorage.setItem('zenbali_admin_token', response.data.token);
                    localStorage.setItem('zenbali_token', response.data.token);
                    localStorage.setItem('zenbali_user', JSON.stringify({...response.data.admin, user_type: 'admin'}));
                    window.location.href = Utils.appUrl('/admin/dashboard.html');
                }
            } catch (error) {
                document.getElementById('alertContainer').innerHTML = `<div class="alert alert-error">${error.message}</div>`;
                btn.disabled = false;
                btn.textContent = 'Login';
            }
        });
    </script>
</body>
</html>
