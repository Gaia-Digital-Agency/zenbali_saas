<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Admin - New Event</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <header class="header header-dark">
        <div class="container">
            <div class="header-content">
                <a href="/admin/dashboard.html" class="logo"><span>🌴</span><span>Zen Bali Admin</span></a>
                <nav class="nav">
                    <a href="/admin/dashboard.html" class="nav-link">Dashboard</a>
                    <a href="/admin/events.html" class="nav-link">Events</a>
                    <a href="/admin/creators.html" class="nav-link">Creators</a>
                    <a href="/admin/payments.html" class="nav-link">Payments</a>
                    <a href="/admin/adminprofile.html" class="nav-link">Profile</a>
                    <a href="#" class="nav-link" onclick="adminLogout()">Logout</a>
                </nav>
            </div>
        </div>
    </header>

    <main style="padding: 3rem 0;">
        <div class="container" style="max-width: 700px;">
            <div class="d-flex align-center mb-4" style="gap: 1rem;">
                <a href="/admin/events.html" class="btn btn-secondary btn-sm">← Back</a>
                <h1>New Event</h1>
            </div>

            <div class="card">
                <div class="card-body">
                    <form id="createEventForm">

                        <div class="form-group">
                            <label class="form-label">Creator <span class="required">*</span></label>
                            <select name="creator_id" id="creatorSelect" class="form-control" required>
                                <option value="">Select creator...</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Event Title <span class="required">*</span></label>
                            <input type="text" name="title" class="form-control" required placeholder="e.g., Full Moon Yoga Retreat">
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Event Date <span class="required">*</span></label>
                                <input type="date" name="event_date" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Event Time</label>
                                <input type="time" name="event_time" class="form-control">
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Location <span class="required">*</span></label>
                            <select name="location_id" class="form-control" required id="locationSelect"></select>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Event Type <span class="required">*</span></label>
                                <select name="event_type_id" class="form-control" required id="eventTypeSelect"></select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Duration</label>
                                <input type="text" name="duration" class="form-control" placeholder="e.g. 2 hours">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Entrance Type <span class="required">*</span></label>
                                <select name="entrance_type_id" class="form-control" required id="entranceTypeSelect"></select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Entrance Fee (IDR)</label>
                                <input type="number" name="entrance_fee" class="form-control" min="0" step="1" value="0">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Participant Group <span class="required">*</span></label>
                                <select name="participant_group_type" class="form-control" required>
                                    <option value="">Select...</option>
                                    <option value="Couples">Couples</option>
                                    <option value="Females Only">Females Only</option>
                                    <option value="Males Only">Males Only</option>
                                    <option value="Open">Open</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Lead By <span class="required">*</span></label>
                                <input type="text" name="lead_by" class="form-control" placeholder="e.g., John Smith" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Venue</label>
                            <input type="text" name="venue" class="form-control" maxlength="50" placeholder="e.g., The Yoga Barn, Studio 3">
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Contact Email <span class="required">*</span></label>
                                <input type="email" name="contact_email" class="form-control" required placeholder="contact@example.com">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Contact Mobile</label>
                                <input type="tel" name="contact_mobile" class="form-control" placeholder="+62 812 345 6789">
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Event Description</label>
                            <textarea name="notes" class="form-control" rows="4" placeholder="Describe your event..."></textarea>
                        </div>

                        <div class="form-row" style="margin-bottom: 1.5rem;">
                            <div class="form-group">
                                <label class="form-label">
                                    <input type="checkbox" name="is_paid"> Paid
                                </label>
                            </div>
                            <div class="form-group">
                                <label class="form-label">
                                    <input type="checkbox" name="is_published"> Published
                                </label>
                            </div>
                        </div>

                        <div class="d-flex gap-2" style="flex-wrap: wrap;">
                            <button type="submit" class="btn btn-primary" id="saveBtn">Create Event</button>
                            <a href="/admin/events.html" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container"><div class="footer-content">
            <div class="footer-credit">Developed by <a href="https://net1io.com" target="_blank">net1io.com</a> | Copyright &copy; 2024</div>
        </div></div>
    </footer>

    <script src="/js/main.js"></script>
    <script>
        function adminLogout() {
            localStorage.removeItem('zenbali_admin_token');
            localStorage.removeItem('zenbali_token');
            localStorage.removeItem('zenbali_user');
            window.location.href = `${APP_BASE}/admin/login.html`;
        }

        function requireAdmin() {
            const token = localStorage.getItem('zenbali_admin_token');
            if (!token) { window.location.href = `${APP_BASE}/admin/login.html`; return false; }
            localStorage.setItem('zenbali_token', token);
            return true;
        }

        function fillSelect(id, items, labelKey = 'name') {
            const select = document.getElementById(id);
            if (!select) return;
            select.innerHTML = '<option value="">Select...</option>';
            items.forEach(item => {
                const opt = document.createElement('option');
                opt.value = item.id;
                opt.textContent = item[labelKey];
                select.appendChild(opt);
            });
        }

        document.addEventListener('DOMContentLoaded', async () => {
            if (!requireAdmin()) return;

            const [locRes, etRes, enRes, crRes] = await Promise.all([
                API.get('/locations'),
                API.get('/event-types'),
                API.get('/entrance-types'),
                API.get('/admin/creators?limit=200')
            ]);
            fillSelect('locationSelect', locRes.data || []);
            fillSelect('eventTypeSelect', etRes.data || []);
            fillSelect('entranceTypeSelect', enRes.data || []);

            const creators = crRes.success ? (crRes.data.creators || []) : [];
            const cs = document.getElementById('creatorSelect');
            creators.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.id;
                opt.textContent = c.name + (c.email ? ` (${c.email})` : '');
                cs.appendChild(opt);
            });

            document.getElementById('createEventForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const form = e.target;
                const timeValue = form.event_time.value;
                const payload = {
                    creator_id: form.creator_id.value,
                    title: form.title.value.trim(),
                    event_date: form.event_date.value,
                    event_time: timeValue ? `${timeValue}:00` : '',
                    location_id: parseInt(form.location_id.value, 10),
                    event_type_id: parseInt(form.event_type_id.value, 10),
                    duration: form.duration.value.trim(),
                    entrance_type_id: parseInt(form.entrance_type_id.value, 10),
                    entrance_fee: parseFloat(form.entrance_fee.value || '0'),
                    participant_group_type: form.participant_group_type.value,
                    lead_by: form.lead_by.value.trim(),
                    venue: form.venue.value.trim(),
                    contact_email: form.contact_email.value.trim(),
                    contact_mobile: form.contact_mobile.value.trim(),
                    notes: form.notes.value.trim(),
                    is_paid: form.is_paid.checked,
                    is_published: form.is_published.checked
                };

                const btn = document.getElementById('saveBtn');
                btn.disabled = true;
                btn.textContent = 'Creating...';
                try {
                    await API.post('/admin/admin/events', payload);
                    Utils.showSuccess('Event created successfully.');
                    setTimeout(() => { window.location.href = `${APP_BASE}/admin/events.html`; }, 1000);
                } catch (error) {
                    Utils.showError(error.message || 'Failed to create event.');
                    btn.disabled = false;
                    btn.textContent = 'Create Event';
                }
            });
        });
    </script>
</body>
</html>
